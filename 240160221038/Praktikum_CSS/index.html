<!DOCTYPE html>
<html>
<head>
    <title>Praktikum CSS</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #74ebd5, #ACB6E5);
            padding: 20px;
        }

        .container {
            background-color: white;
            width: 80%;
            margin: auto;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 0 10px gray;
        }

        h1 {
            color: #2c3e50;
            text-align: center;
        }

        h2 {
            color: #3498db;
        }

        p {
            color: #555;
            font-size: 18px;
            text-align: center;
        }

        img {
            width: 150px;
            border-radius: 50%;
            display: block;
            margin: auto;
            border: 4px solid #3498db;
        }

        ul {
            margin-left: 20px;
        }

        audio {
            display: block;
            margin: 20px auto;
        }

        iframe {
            display: block;
            margin: 20px auto;
            border-radius: 10px;
        }

        a {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: white;
            background-color: #3498db;
            padding: 10px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: bold;
        }

        a:hover {
            background-color: #2980b9;
        }

        footer {
            text-align: center;
            margin-top: 30px;
            color: gray;
        }

    </style>
</head>

<body>

    <div class="container">

        <h1>Portofolio Resa</h1>

        <img src="profil.jpg">

        <h2>Tentang Saya</h2>

        <p>
            Halo! Nama saya Resa Khoerunnisa.
            Saya mahasiswa Sistem Informasi
            Universitas Sebelas April Sumedang.
        </p>

        <h2>Hobi Saya</h2>

        <ul>
            <li>Membaca</li>
            <li>Mendengarkan Musik</li>
            <li>Menonton Film</li>
        </ul>

        <h2>Video Favorit</h2>

        <iframe width="560" height="315"
            src="https://www.youtube.com/embed/GPy40iI2VXE"
            title="YouTube video"
            allowfullscreen>
        </iframe>

        <a href="https://github.com/240160221038-ResaKhoerunnisa">
            GitHub Saya
        </a>

        <footer>
            © 2026 Portofolio Resa Khoerunnisa
        </footer>

    </div>

</body>
</html>
